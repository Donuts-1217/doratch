<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>個人檔案 - Creative Blocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --scratch-blue: #4C97FF; --scratch-purple: #855CD6; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #F0F2F5; margin: 0; }
        
        nav { background: var(--scratch-blue); color: white; padding: 15px 5%; display: flex; align-items: center; gap: 20px; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        /* 個人資料卡 */
        .profile-card {
            background: white; border-radius: 20px; padding: 40px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }
        .avatar-large {
            width: 120px; height: 120px; border-radius: 50%;
            border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: -100px; background: white;
        }
        .user-email { font-size: 24px; font-weight: 900; margin-top: 15px; color: #333; }
        .user-id { font-size: 12px; color: #aaa; margin-top: 5px; }

        /* 數據統計區 */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;
        }
        .stat-box {
            background: #F8FAFC; padding: 20px; border-radius: 15px;
            border: 1px solid #E2E8F0;
        }
        .stat-value { font-size: 28px; font-weight: 900; color: var(--scratch-blue); }
        .stat-label { font-size: 14px; color: #64748B; margin-top: 5px; }

        .btn-edit-profile {
            margin-top: 30px; background: var(--scratch-blue); color: white;
            border: none; padding: 10px 25px; border-radius: 20px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-edit-profile:hover { transform: scale(1.05); background: var(--scratch-purple); }
    </style>
</head>
<body>

<nav>
    <a href="main.html" style="color:white; text-decoration:none; font-weight:bold;">⬅ 返回首頁</a>
    <h2>個人檔案</h2>
</nav>

<div class="container">
    <div style="height: 80px;"></div> <div class="profile-card">
        <img id="profile-avatar" class="avatar-large" src="">
        <div id="display-email" class="user-email">載入中...</div>
        <div id="display-uid" class="user-id">UID: ---</div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div id="count-projects" class="stat-value">0</div>
                <div class="stat-label">我的作品</div>
            </div>
            <div class="stat-box">
                <div id="count-classes" class="stat-value">0</div>
                <div class="stat-label">參與班級</div>
            </div>
        </div>

        <button class="btn-edit-profile" onclick="alert('個人資料修改功能開發中！')">修改個人資料</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU",
        authDomain: "chat-52c0d.firebaseapp.com",
        projectId: "chat-52c0d",
        storageBucket: "chat-52c0d.firebasestorage.app",
        messagingSenderId: "449329325475",
        appId: "1:449329325475:web:75f255c4055360dc9e6616"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            location.href = "login.html";
            return;
        }

        // 1. 顯示基本資訊
        document.getElementById('display-email').innerText = user.email;
        document.getElementById('display-uid').innerText = `帳號編號: ${user.uid}`;
        document.getElementById('profile-avatar').src = `https://ui-avatars.com/api/?name=${user.email}&size=128&background=random`;

        // 2. 統計數據
        try {
            // 計算作品數量 (從使用者的 projects 子集合)
            const projSnap = await getDocs(collection(db, "users", user.uid, "projects"));
            document.getElementById('count-projects').innerText = projSnap.size;

            // 計算參與班級數量 (包含老師和學生)
            const qT = query(collection(db, "classes"), where("teacherId", "==", user.uid));
            const qS = query(collection(db, "classes"), where("students", "array-contains", user.uid));
            
            const [tSnap, sSnap] = await Promise.all([getDocs(qT), getDocs(qS)]);
            const totalClasses = tSnap.size + sSnap.size;
            document.getElementById('count-classes').innerText = totalClasses;

        } catch (e) {
            console.error("數據統計失敗", e);
        }
    });
</script>

</body>
</html>
