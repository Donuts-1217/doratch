<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>指令實驗室 - Creative Blocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4C97FF; --secondary: #FFAB19; --accent: #855CD6; --bg: #0F172A; --card-bg: #1E293B;
            --text: #F8FAFC;
        }
        body { font-family: 'Outfit', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        nav { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 0 5%; height: 80px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 900; font-size: 1.6rem; color: #4C97FF; cursor: pointer; }
        
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .unit-card { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); text-align: center; transition: 0.3s; }
        .unit-card:hover { transform: translateY(-5px); border-color: var(--secondary); }
        
        .unit-icon { font-size: 60px; margin-bottom: 20px; }
        .unit-level { font-size: 1.2rem; font-weight: 900; color: var(--secondary); margin-bottom: 10px; }
        .stats { font-size: 14px; color: #94A3B8; margin-bottom: 20px; line-height: 1.6; }
        
        .btn-upgrade { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--secondary); color: white; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-upgrade:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
        .btn-upgrade:disabled { opacity: 0.5; cursor: not-allowed; background: #475569; }
        .btn-nav { text-decoration:none; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-nav:hover { background: white; color: var(--bg); }
        .nav-actions { display: flex; gap: 10px; align-items: center; }

        /* 全域導覽列樣式 */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar-main { width: 260px; background: #0B0E14; color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-logo { padding: 30px; font-weight: 900; font-size: 1.2rem; color: var(--primary); cursor: pointer; }
        .nav-item { padding: 15px 30px; display: flex; align-items: center; gap: 12px; color: #94A3B8; text-decoration: none; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { color: var(--primary); border-left: 4px solid var(--primary); }
        .sidebar-footer { margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .user-mini-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.03); }
        .main-content { flex: 1; margin-left: 260px; padding: 40px; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar-main">
        <div class="sidebar-logo" onclick="location.href='dashboard.html'">🧩 Creative Blocks</div>
        <a href="dashboard.html" class="nav-item">🏠 我的班級</a>
        <a href="lab.html" class="nav-item active">🧪 指令實驗室</a>
        <a href="game.html" class="nav-item">🎮 指令塔防</a>
        <a href="shop.html" class="nav-item">🛒 創意商城</a>
        <a href="chat.html" class="nav-item">💬 交流大廳</a>
        <a href="admin.html" id="admin-link-main" class="nav-item" style="display:none; color:var(--accent);">🛠️ 管理面板</a>
        
        <div class="sidebar-footer">
            <div class="user-mini-card">
                <img id="side-avatar" src="" style="width:32px; height:32px; border-radius:50%;">
                <div style="flex:1; overflow:hidden;">
                    <div id="side-username" style="font-size:12px; font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">載入中...</div>
                    <div style="font-size:10px; color:#64748B;">💰 <span id="side-coins">0</span></div>
                </div>
                <button onclick="handleLogout()" style="background:none; border:none; color:#64748B; cursor:pointer;">🚪</button>
            </div>
        </div>
    </aside>

    <main class="main-content">

<div class="container">
    <h1 style="font-size:3rem; text-align:center; margin-bottom:10px;">指令實驗室</h1>
    <p style="text-align:center; color:#94A3B8; margin-bottom:50px;">強化你的代碼指令，在「代碼戰爭」中橫掃千軍！</p>

    <div class="lab-grid" id="lab-grid">
        <!-- Units will load here -->
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    window.handleLogout = () => signOut(auth).then(() => location.href='index.html');

    const firebaseConfig = { apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU", authDomain: "chat-52c0d.firebaseapp.com", projectId: "chat-52c0d", appId: "1:449329325475:web:75f255c4055360dc9e6616" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userData = null;
    const unitStats = {
        input: { name: "input() 指令", icon: "📥", baseHp: 50, baseAtk: 5, desc: "初階探路單位，便宜且速度快。" },
        print: { name: "print() 指令", icon: "📤", baseHp: 80, baseAtk: 12, desc: "遠程攻擊單位，能穩定輸出傷害。" },
        ifelse: { name: "if-else 判斷", icon: "⚖️", baseHp: 200, baseAtk: 10, desc: "重裝坦克，高血量負責在前排抵擋敵人。" }
    };

    window.handleLogout = () => signOut(auth).then(() => location.href='index.html');

    onAuthStateChanged(auth, async u => {
        if (!u) return location.href = 'login.html';
        fetchSidebarData(u);
        refreshUI(u);
    });

    async function fetchSidebarData(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('side-coins').innerText = data.coins || 0;
            document.getElementById('side-username').innerText = user.email.split('@')[0];
            document.getElementById('side-avatar').src = `https://ui-avatars.com/api/?name=${user.email}&background=random`;
            
            let role = data.role || 'student';
            if (user.email === 'chianghansen0302@gmail.com') role = 'admin';
            if(role === 'admin' || role === 'teacher') {
                const adminLink = document.getElementById('admin-link-main');
                if(adminLink) {
                    adminLink.style.display = 'flex';
                    adminLink.innerText = role === 'admin' ? '🛠️ 管理面板' : '❓ 題庫管理';
                }
            }
        }
    }

    async function refreshUI(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        userData = snap.data();
        
        document.getElementById('side-username').innerText = user.email.split('@')[0];
        document.getElementById('side-avatar').src = `https://ui-avatars.com/api/?name=${user.email}&background=random`;
        
        let role = userData?.role || 'student';
        if (user.email === 'chianghansen0302@gmail.com') role = 'admin';
        if(role === 'admin' || role === 'teacher') {
            const adminLink = document.getElementById('admin-link-main');
            adminLink.style.display = 'flex';
            adminLink.innerText = role === 'admin' ? '🛠️ 管理面板' : '❓ 題庫管理';
        }
        
        const grid = document.getElementById('lab-grid');
        grid.innerHTML = '';
        
        const levels = userData.unitLevels || { input: 1, print: 1, ifelse: 1 };

        Object.keys(unitStats).forEach(key => {
            const unit = unitStats[key];
            const lv = levels[key] || 1;
            const upgradeCost = lv * 100;
            const hp = Math.floor(unit.baseHp * (1 + lv * 0.1));
            const atk = Math.floor(unit.baseAtk * (1 + lv * 0.1));

            const card = document.createElement('div');
            card.className = 'unit-card';
            card.innerHTML = `
                <div class="unit-icon">${unit.icon}</div>
                <h3 style="margin:0;">${unit.name}</h3>
                <div class="unit-level">Lv. ${lv}</div>
                <div class="stats">
                    HP: ${hp} | ATK: ${atk}<br>
                    ${unit.desc}
                </div>
                <button class="btn-upgrade" onclick="upgradeUnit('${key}', ${upgradeCost})" ${userData.coins < upgradeCost ? 'disabled' : ''}>
                    ${userData.coins < upgradeCost ? '金幣不足' : `升級 (💰 ${upgradeCost})`}
                </button>
            `;
            grid.appendChild(card);
        });
    }

    window.upgradeUnit = async (key, cost) => {
        if(userData.coins < cost) return;
        
        const ref = doc(db, "users", auth.currentUser.uid);
        const updates = {
            coins: increment(-cost),
            [`unitLevels.${key}`]: (userData.unitLevels?.[key] || 1) + 1
        };
        
        await updateDoc(ref, updates);
        alert("升級成功！");
        refreshUI();
    };
</script>
</body>
</html>
    </main>
</div>
