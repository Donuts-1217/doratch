<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>登入 / 註冊 - Creative Blocks</title>
    <style>
        :root { --scratch-blue: #4C97FF; --scratch-orange: #FFAB19; }
        body { 
            font-family: "Noto Sans TC", sans-serif; 
            background: linear-gradient(135deg, #4C97FF 0%, #855CD6 100%); 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .auth-card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; 
        }
        .logo { font-size: 24px; font-weight: 900; color: var(--scratch-blue); margin-bottom: 20px; cursor: pointer; }
        h2 { color: #444; margin-bottom: 25px; }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 2px solid #EEE; border-radius: 10px; box-sizing: border-box; 
            outline: none; transition: 0.3s; font-size: 16px;
        }
        input:focus { border-color: var(--scratch-blue); }
        
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-primary { background: var(--scratch-blue); color: white; }
        .btn-primary:hover { background: #357ABD; }
        
        .toggle-link { margin-top: 20px; font-size: 14px; color: #666; }
        .toggle-link span { color: var(--scratch-blue); cursor: pointer; font-weight: bold; }
        
        .loading { display: none; margin-top: 10px; font-size: 14px; color: var(--scratch-blue); }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo" onclick="location.href='index.html'">🧩 Creative Blocks</div>
    <h2 id="auth-title">會員登入</h2>
    
    <input type="email" id="email" placeholder="電子郵件 (Email)">
    <input type="password" id="password" placeholder="密碼 (至少 6 位數)">
    
    <button id="main-btn" class="btn btn-primary" onclick="handleAuth()">登入</button>
    <div id="loading-msg" class="loading">處理中，請稍候...</div>

    <div class="toggle-link" id="toggle-area">
        還沒有帳號嗎？ <span onclick="switchMode('reg')">立即註冊</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        sendEmailVerification 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU",
        authDomain: "chat-52c0d.firebaseapp.com",
        projectId: "chat-52c0d",
        storageBucket: "chat-52c0d.firebasestorage.app",
        messagingSenderId: "449329325475",
        appId: "1:449329325475:web:75f255c4055360dc9e6616"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let mode = 'login'; // 'login' 或 'reg'

    // 切換 登入/註冊 介面
    window.switchMode = (target) => {
        mode = target;
        const title = document.getElementById('auth-title');
        const mainBtn = document.getElementById('main-btn');
        const toggleArea = document.getElementById('toggle-area');

        if (mode === 'reg') {
            title.innerText = "註冊新帳號";
            mainBtn.innerText = "註冊並發送驗證信";
            toggleArea.innerHTML = `已有帳號？ <span onclick="switchMode('login')">點此登入</span>`;
        } else {
            title.innerText = "會員登入";
            mainBtn.innerText = "登入";
            toggleArea.innerHTML = `還沒有帳號嗎？ <span onclick="switchMode('reg')">立即註冊</span>`;
        }
    };

    // 核心邏輯：處理登入或註冊
    window.handleAuth = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const loading = document.getElementById('loading-msg');

        if (!email || !password) return alert("請完整填寫欄位");
        
        loading.style.display = "block";

        try {
            if (mode === 'reg') {
                // --- 註冊邏輯 ---
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // 註冊成功後立即發送驗證信
                await sendEmailVerification(userCredential.user);
                alert("✅ 註冊成功！驗證連結已寄出到您的信箱，請先驗證再登入。");
                switchMode('login');
            } else {
                // --- 登入邏輯 ---
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 檢查是否已驗證（選用，建議開啟）
                if (!user.emailVerified) {
                    alert("⚠️ 您的 Email 尚未驗證，請至信箱點擊連結。");
                    // 也可以選擇讓未驗證的人照樣進入，但這裡建議強制驗證
                }
                
                alert("🎉 登入成功！");
                location.href = "main.html"; // 登入後跳轉主頁
            }
        } catch (error) {
            console.error(error.code);
            handleError(error.code);
        } finally {
            loading.style.display = "none";
        }
    };

    // 錯誤代碼中文化
    function handleError(code) {
        let msg = "認證失敗，請重試。";
        switch (code) {
            case 'auth/email-already-in-use': msg = "此 Email 已被註冊，請直接登入。"; break;
            case 'auth/weak-password': msg = "密碼太弱囉，至少需要 6 個字。"; break;
            case 'auth/invalid-email': msg = "Email 格式不正確。"; break;
            case 'auth/invalid-credential': msg = "Email 或密碼錯誤。"; break;
            case 'auth/too-many-requests': msg = "嘗試次數過多，請稍後再試。"; break;
            case 'auth/user-not-found': msg = "找不到此帳號，請先註冊。"; break;
        }
        alert(msg);
    }
</script>

</body>
</html>
