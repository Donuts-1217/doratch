<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會員系統 - Creative Blocks</title>
    <style>
        :root { --scratch-blue: #4C97FF; --scratch-purple: #855CD6; }
        body { 
            font-family: "Noto Sans TC", sans-serif; 
            background: linear-gradient(135deg, #4C97FF 0%, #855CD6 100%); 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .auth-card { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; 
        }
        .logo { font-size: 26px; font-weight: 900; color: var(--scratch-blue); margin-bottom: 10px; cursor: pointer; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 2px solid #EEE; border-radius: 10px; box-sizing: border-box; 
            outline: none; transition: 0.3s; font-size: 16px;
        }
        input:focus { border-color: var(--scratch-blue); }
        
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-primary { background: var(--scratch-blue); color: white; }
        .btn-primary:hover { background: #357ABD; transform: translateY(-1px); }
        
        .toggle-link { margin-top: 20px; font-size: 14px; color: #666; }
        .toggle-link span { color: var(--scratch-blue); cursor: pointer; font-weight: bold; text-decoration: underline; }
        
        #message-box { margin-top: 15px; font-size: 13px; padding: 10px; border-radius: 8px; display: none; }
        .msg-error { background: #FFEBEE; color: #D32F2F; }
        .msg-success { background: #E8F5E9; color: #2E7D32; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo" onclick="location.href='index.html'">🧩 Creative Blocks</div>
    <div class="subtitle">啟發你的程式邏輯</div>
    <h2 id="auth-title">會員登入</h2>
    
    <div id="message-box"></div>

    <input type="email" id="email" placeholder="電子郵件 (Email)">
    <input type="password" id="password" placeholder="密碼 (至少 6 位數)">
    
    <button id="main-btn" class="btn btn-primary" onclick="handleAuth()">登入</button>

    <div class="toggle-link" id="toggle-area">
        還沒有帳號嗎？ <span onclick="switchMode('reg')">立即註冊</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        sendEmailVerification,
        signOut 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU",
        authDomain: "chat-52c0d.firebaseapp.com",
        projectId: "chat-52c0d",
        storageBucket: "chat-52c0d.firebasestorage.app",
        messagingSenderId: "449329325475",
        appId: "1:449329325475:web:75f255c4055360dc9e6616"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let mode = 'login';

    // 顯示訊息提示
    function showMsg(text, type) {
        const box = document.getElementById('message-box');
        box.innerText = text;
        box.className = type === 'error' ? 'msg-error' : 'msg-success';
        box.style.display = 'block';
    }

    window.switchMode = (target) => {
        mode = target;
        document.getElementById('message-box').style.display = 'none';
        const title = document.getElementById('auth-title');
        const mainBtn = document.getElementById('main-btn');
        const toggleArea = document.getElementById('toggle-area');

        if (mode === 'reg') {
            title.innerText = "註冊新帳號";
            mainBtn.innerText = "註冊並發送驗證信";
            toggleArea.innerHTML = `已有帳號？ <span onclick="switchMode('login')">點此登入</span>`;
        } else {
            title.innerText = "會員登入";
            mainBtn.innerText = "登入";
            toggleArea.innerHTML = `還沒有帳號嗎？ <span onclick="switchMode('reg')">立即註冊</span>`;
        }
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!email || !password) return showMsg("請填寫完整資訊", "error");

        try {
            if (mode === 'reg') {
                // --- 註冊模式 ---
                const res = await createUserWithEmailAndPassword(auth, email, password);
                // 1. 發送驗證信
                await sendEmailVerification(res.user);
                // 2. 註冊後會自動登入，但因為未驗證，我們強制登出他
                await signOut(auth);
                
                showMsg("✅ 註冊成功！驗證信已寄出，請點擊信中連結後再重新登入。", "success");
                switchMode('login');
            } else {
                // --- 登入模式 ---
                const res = await signInWithEmailAndPassword(auth, email, password);
                const user = res.user;

                // 檢查是否驗證
                if (user.emailVerified) {
                    showMsg("🎉 登入成功，正在導向...", "success");
                    setTimeout(() => location.href = "main.html", 1000);
                } else {
                    // ❌ 未驗證，彈出警告並強制登出
                    showMsg("⚠️ 您的 Email 尚未驗證！請先至信箱點擊連結。", "error");
                    await signOut(auth);
                }
            }
        } catch (error) {
            let errorMsg = "認證失敗，請檢查帳密";
            if (error.code === 'auth/email-already-in-use') errorMsg = "此 Email 已被註冊";
            if (error.code === 'auth/invalid-credential') errorMsg = "帳號或密碼錯誤";
            if (error.code === 'auth/weak-password') errorMsg = "密碼至少需要 6 位數";
            showMsg(errorMsg, "error");
        }
    };
</script>

</body>
</html>
