<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>探索中心 - Creative Blocks Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4C97FF; --secondary: #FFAB19; --accent: #855CD6;
            --bg: #0F172A; --card-bg: #1E293B; --text: #F8FAFC;
        }
        body { margin: 0; font-family: 'Outfit', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        nav { 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); 
            height: 80px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; position: fixed; width: 90%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--primary); cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-link { color: #94A3B8; text-decoration: none; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .nav-link:hover { color: var(--primary); }

        .hero { padding: 120px 5% 60px; text-align: center; background: radial-gradient(circle at 50% 0%, rgba(76, 151, 255, 0.15), transparent 70%); }
        .hero h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .hero p { color: #94A3B8; margin-top: 10px; font-size: 1.1rem; }

        .search-area { max-width: 800px; margin: -30px auto 40px; padding: 0 20px; position: relative; z-index: 10; }
        .search-bar { width: 100%; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 20px 30px; border-radius: 20px; color: white; font-size: 1.1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 20px 40px rgba(76, 151, 255, 0.2); }

        .container { padding: 0 5% 100px; }
        .filter-tabs { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; }
        .tab { padding: 10px 25px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #94A3B8; cursor: pointer; white-space: nowrap; transition: 0.3s; font-weight: bold; }
        .tab:hover { background: rgba(255,255,255,0.1); color: white; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .p-card { background: var(--card-bg); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; transition: 0.4s; cursor: pointer; }
        .p-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .p-thumb { height: 200px; background: #0b0e14; display: flex; align-items: center; justify-content: center; font-size: 5rem; position: relative; }
        .p-thumb::after { content: 'View Project'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(76, 151, 255, 0.8); color: white; font-weight: 900; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .p-card:hover .p-thumb::after { opacity: 1; }

        .p-info { padding: 25px; }
        .p-name { font-size: 1.3rem; font-weight: 900; margin-bottom: 12px; }
        .p-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; color: #94A3B8; }
        .p-author { display: flex; align-items: center; gap: 10px; }
        .p-author img { width: 24px; height: 24px; border-radius: 50%; }

        .loading-pulse { width: 100%; height: 300px; background: rgba(255,255,255,0.02); border-radius: 24px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* 全域導覽列樣式 */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar-main { width: 260px; background: #0B0E14; color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-logo { padding: 30px; font-weight: 900; font-size: 1.2rem; color: var(--primary); cursor: pointer; }
        .nav-item { padding: 15px 30px; display: flex; align-items: center; gap: 12px; color: #94A3B8; text-decoration: none; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { color: var(--primary); border-left: 4px solid var(--primary); }
        .sidebar-footer { margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .user-mini-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.03); }
        .main-content { flex: 1; margin-left: 260px; }
    </style>
</head>
<body>

<body>

<div class="app-container">
    <aside class="sidebar-main">
        <div class="sidebar-logo" onclick="location.href='index.html'">🧩 Creative Blocks</div>
        <a href="index.html" class="nav-item">🏠 平台首頁</a>
        <a href="dashboard.html" class="nav-item">🏫 我的班級</a>
        
        <div style="margin: 20px 30px 10px; font-size: 11px; color: #475569; letter-spacing: 1px; text-transform: uppercase;">創作與探索</div>
        <a href="page.html" class="nav-item">🚀 創作空間</a>
        <a href="main.html?view=mine" class="nav-item">📂 我的作品</a>
        <a href="main.html" class="nav-item">🌍 探索中心</a>

        <div style="margin: 20px 30px 10px; font-size: 11px; color: #475569; letter-spacing: 1px; text-transform: uppercase;">指令競技</div>
        <a href="lab.html" class="nav-item">🧪 指令實驗室</a>
        <a href="game.html" class="nav-item">🎮 指令塔防</a>
        <a href="shop.html" class="nav-item">🛒 創意商城</a>
        <a href="chat.html" class="nav-item">💬 交流大廳</a>
        <a href="main.html" class="nav-item active">🌍 探索中心</a>
        <a href="admin.html" id="admin-link-main" class="nav-item" style="display:none; color:var(--accent);">🛠️ 管理面板</a>
        
        <div class="sidebar-footer">
            <div class="user-mini-card">
                <img id="side-avatar" src="" style="width:32px; height:32px; border-radius:50%;">
                <div style="flex:1; overflow:hidden;">
                    <div id="side-username" style="font-size:12px; font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">載入中...</div>
                    <div style="font-size:10px; color:#64748B;">💰 <span id="side-coins">0</span></div>
                </div>
                <button onclick="handleLogout()" style="background:none; border:none; color:#64748B; cursor:pointer;">🚪</button>
            </div>
        </div>
    </aside>

    <main class="main-content">

<div class="hero">
    <h1>探索無限創意</h1>
    <p>匯集全校最優秀的積木程式作品，激發你的邏輯靈感</p>
</div>

<div class="search-area">
    <input type="text" class="search-bar" id="search-input" placeholder="🔍 搜尋專案名稱、作者或關鍵字..." oninput="handleSearch()">
</div>

<div class="container">
    <div class="filter-tabs">
        <div class="tab active" onclick="filterBy('all')">🌈 全部作品</div>
        <div class="tab" onclick="filterBy('apcs')">🛡️ APCS 挑戰</div>
        <div class="tab" onclick="filterBy('game')">🎮 遊戲製作</div>
        <div class="tab" onclick="filterBy('art')">🎨 藝術創作</div>
        <div class="tab" onclick="filterBy('remix')">♻️ 改編專案</div>
    </div>

    <div id="project-grid" class="project-grid">
        <div class="loading-pulse"></div>
        <div class="loading-pulse"></div>
        <div class="loading-pulse"></div>
    </div>
</div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collectionGroup, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU", authDomain: "chat-52c0d.firebaseapp.com", projectId: "chat-52c0d", appId: "1:449329325475:web:75f255c4055360dc9e6616" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleLogout = () => signOut(auth).then(() => location.href='index.html');

    let projects = [];

    onAuthStateChanged(auth, async u => {
        if (u) {
            fetchUserData(u);
        } else {
            document.querySelector('.sidebar-footer').style.display = 'none';
        }
        fetchProjects();
    });

    async function fetchUserData(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('side-coins').innerText = data.coins || 0;
            document.getElementById('side-username').innerText = user.email.split('@')[0];
            document.getElementById('side-avatar').src = `https://ui-avatars.com/api/?name=${user.email}&background=random`;
            
            let role = data.role || 'student';
            if (user.email === 'chianghansen0302@gmail.com') role = 'admin';
            if(role === 'admin' || role === 'teacher') {
                const adminLink = document.getElementById('admin-link-main');
                if(adminLink) {
                    adminLink.style.display = 'flex';
                    adminLink.innerText = role === 'admin' ? '🛠️ 管理面板' : '❓ 題庫管理';
                }
            }
        }
    }

    async function fetchProjects() {
        const params = new URLSearchParams(window.location.search);
        const view = params.get('view');
        const gridTitle = document.getElementById('grid-title');
        
        let q;
        if (view === 'mine' && auth.currentUser) {
            if(gridTitle) gridTitle.innerText = "📂 我的作品集";
            // 查詢自己的所有專案 (不論是否公開)
            q = query(collection(db, "users", auth.currentUser.uid, "projects"), orderBy("updatedAt", "desc"));
        } else {
            if(gridTitle) gridTitle.innerText = "🌍 全球探索中心";
            q = query(collectionGroup(db, "projects"), where("isPublic", "==", true), orderBy("updatedAt", "desc"));
        }

        const snap = await getDocs(q);
        projects = [];
        snap.forEach(doc => {
            const d = doc.data();
            projects.push({
                id: doc.id,
                owner: view === 'mine' ? auth.currentUser.uid : doc.ref.parent.parent.id,
                ...d,
                author: d.authorEmail?.split('@')[0] || '匿名'
            });
        });
        render(projects);
    }

    function render(list) {
        const grid = document.getElementById('project-grid');
        grid.innerHTML = list.length ? '' : '<div style="grid-column:1/-1; text-align:center; color:#64748B;">沒有找到相關作品</div>';
        list.forEach(p => {
            const card = document.createElement('div');
            card.className = 'p-card';
            card.onclick = () => location.href = `project.html?id=${p.id}&owner=${p.owner}`;
            card.innerHTML = `
                <div class="p-thumb">🚀</div>
                <div class="p-info">
                    <div class="p-name">${p.name || '未命名'}</div>
                    <div class="p-meta">
                        <div class="p-author">
                            <img src="https://ui-avatars.com/api/?name=${p.author}&background=random">
                            <span>${p.author}</span>
                        </div>
                        <div>${p.originalPid ? '♻️ Remix' : '✨ Original'}</div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    window.handleSearch = () => {
        const key = document.getElementById('search-input').value.toLowerCase();
        render(projects.filter(p => p.name?.toLowerCase().includes(key) || p.author.toLowerCase().includes(key)));
    };

    window.filterBy = (tag) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if(tag === 'all') render(projects);
        else if(tag === 'remix') render(projects.filter(p => p.originalPid));
        else render(projects.filter(p => p.name?.toLowerCase().includes(tag)));
    };
</script>
</body>
</html>
