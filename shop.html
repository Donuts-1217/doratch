<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>創意商城 - Creative Blocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --scratch-blue: #4C97FF; --scratch-orange: #FFAB19; 
            --scratch-purple: #855CD6; --scratch-green: #4CB050;
            --bg-light: #F0F2F5; --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        body { font-family: "Noto Sans TC", sans-serif; background: var(--bg-light); margin: 0; padding: 0; }
        
        nav { background: white; padding: 0 5%; height: 70px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--scratch-blue); cursor: pointer; }
        
        .user-wallet { background: #FFF8E1; border: 2px solid #FFE082; padding: 8px 20px; border-radius: 30px; font-weight: 900; color: #F57C00; display: flex; align-items: center; gap: 10px; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        .item-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: var(--card-shadow); transition: 0.3s; border: 2px solid transparent; }
        .item-card:hover { transform: translateY(-8px); border-color: var(--scratch-orange); }
        .item-icon { font-size: 50px; margin-bottom: 15px; display: block; }
        .item-name { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }
        .item-desc { font-size: 13px; color: #777; margin-bottom: 15px; min-height: 40px; }
        .item-price { font-weight: 900; color: #F57C00; font-size: 1.2rem; margin-bottom: 15px; }
        
        .btn-buy { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-buy.available { background: var(--scratch-orange); color: white; }
        .btn-buy.owned { background: #EEE; color: #999; cursor: default; }
        .btn-buy:active { transform: scale(0.95); }

        /* 大轉盤樣式 */
        .game-section { background: white; border-radius: 25px; padding: 40px; text-align: center; margin-bottom: 40px; box-shadow: var(--card-shadow); position: relative; overflow: hidden; }
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 0 auto 30px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 10px solid #333; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(
            #FFAB19 0deg 60deg, #4C97FF 60deg 120deg, #855CD6 120deg 180deg, 
            #4CB050 180deg 240deg, #FF4D4D 240deg 300deg, #FFD700 300deg 360deg
        ); }
        .wheel-pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 40px; height: 50px; background: #333; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: white; border-radius: 50%; border: 5px solid #333; z-index: 5; }
        .wheel-text { position: absolute; width: 100%; height: 100%; top: 0; left: 0; font-weight: bold; color: white; font-size: 14px; }
        .btn-spin { padding: 15px 40px; border-radius: 30px; border: none; background: var(--scratch-orange); color: white; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 171, 25, 0.4); }
        .btn-spin:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        .category-title { font-weight: 900; font-size: 1.5rem; margin: 40px 0 20px; display: flex; align-items: center; gap: 10px; }
        .btn-nav { text-decoration:none; background: rgba(0,0,0,0.05); color: #444; border: 1px solid rgba(0,0,0,0.1); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-nav:hover { background: var(--scratch-blue); color: white; }
        .nav-actions { display: flex; gap: 10px; align-items: center; }

        /* 全域導覽列樣式 */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar-main { width: 260px; background: #0B0E14; color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-logo { padding: 30px; font-weight: 900; font-size: 1.2rem; color: var(--scratch-blue); cursor: pointer; }
        .nav-item { padding: 15px 30px; display: flex; align-items: center; gap: 12px; color: #94A3B8; text-decoration: none; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { color: var(--scratch-blue); border-left: 4px solid var(--scratch-blue); }
        .sidebar-footer { margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .user-mini-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.03); }
        .main-content { flex: 1; margin-left: 260px; padding: 40px; }
    </style>
</head>
<body>

<body>

<div class="app-container">
    <aside class="sidebar-main">
        <div class="sidebar-logo" onclick="location.href='dashboard.html'">🧩 Creative Blocks</div>
        <a href="dashboard.html" class="nav-item">🏠 我的班級</a>
        <a href="lab.html" class="nav-item">🧪 指令實驗室</a>
        <a href="game.html" class="nav-item">🎮 指令塔防</a>
        <a href="shop.html" class="nav-item active">🛒 創意商城</a>
        <a href="chat.html" class="nav-item">💬 交流大廳</a>
        <a href="admin.html" id="admin-link-main" class="nav-item" style="display:none; color:var(--scratch-purple);">🛠️ 管理面板</a>
        
        <div class="sidebar-footer">
            <div class="user-mini-card">
                <img id="side-avatar" src="" style="width:32px; height:32px; border-radius:50%;">
                <div style="flex:1; overflow:hidden;">
                    <div id="side-username" style="font-size:12px; font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">載入中...</div>
                    <div style="font-size:10px; color:#64748B;">💰 <span id="side-coins">0</span></div>
                </div>
                <button onclick="handleLogout()" style="background:none; border:none; color:#64748B; cursor:pointer;">🚪</button>
            </div>
        </div>
    </aside>

    <main class="main-content">

<div class="container">
    <div style="background:linear-gradient(135deg, #FFAB19, #FF8F00); color:white; padding:40px; border-radius:25px; margin-bottom:40px;">
        <h1 style="margin:0; font-size:2.5rem;">創意商城</h1>
        <p style="margin:10px 0 0; opacity:0.9;">使用任務獲得的金幣，兌換你的專屬個性化道具！</p>
    </div>

    <!-- 幸運大轉盤 -->
    <div class="game-section">
        <h2 style="margin-top:0;">🎡 每日幸運大轉盤</h2>
        <p style="color:#666; margin-bottom:30px;">每天可以免費轉一次，最高可獲得 200 金幣！</p>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div id="lucky-wheel" class="wheel">
                <div class="wheel-center"></div>
            </div>
        </div>
        <button id="btn-spin" class="btn-spin" onclick="spinWheel()">立即抽獎！</button>
        <p id="spin-timer" style="margin-top:15px; color:#999; font-size:13px;"></p>
    </div>

    <div class="category-title">🎨 個人風格</div>
    <div class="shop-grid" id="style-items"></div>

    <div class="category-title">🚀 實用道具</div>
    <div class="shop-grid" id="utility-items"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU",
        authDomain: "chat-52c0d.firebaseapp.com",
        projectId: "chat-52c0d",
        appId: "1:449329325475:web:75f255c4055360dc9e6616"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const itemsBank = [
        { id: 'theme_dark', category: 'style', name: '深淵黑主題', desc: '為你的編輯器換上酷炫的深色模式', price: 1000, icon: '🌑' },
        { id: 'title_pro', category: 'style', name: '【資深開發者】稱號', desc: '在排行榜與聊天室顯示你的尊貴稱號', price: 500, icon: '🎖️' },
        { id: 'avatar_robot', category: 'style', name: '機械戰警頭像', desc: '解鎖專屬機器人頭像框', price: 300, icon: '🤖' },
        { id: 'boost_xp', category: 'utility', name: 'XP 加倍卡 (1次)', desc: '下一項任務獲得雙倍經驗值', price: 200, icon: '⚡' },
        { id: 'hint_ticket', category: 'utility', name: '任務提示券', desc: '直接解鎖任務的所有進階提示', price: 150, icon: '🎫' },
        { id: 'fireworks', category: 'utility', name: '舞台煙火效果', desc: '在執行成功時噴發華麗煙火', price: 600, icon: '🎆' }
    ];

    let currentUserData = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) return location.href = 'login.html';
        loadMallData(user);
    });

    async function loadMallData(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        currentUserData = snap.data() || { coins: 0, inventory: [], lastSpin: 0 };
        document.getElementById('user-coins').innerText = currentUserData.coins || 0;

        // 權限控制按鈕
        let role = currentUserData.role || 'student';
        if (user.email === 'chianghansen0302@gmail.com') role = 'admin';
        if(role === 'admin' || role === 'teacher') {
            const adminLink = document.getElementById('admin-link');
            adminLink.style.display = 'inline-block';
            adminLink.innerText = role === 'admin' ? '🛠️ 開發者面板' : '❓ 題庫管理';
        }

        renderItems();
        checkSpinStatus();
    }

    function checkSpinStatus() {
        const last = currentUserData.lastSpin || 0;
        const now = Date.now();
        const diff = now - last;
        const coolDown = 24 * 60 * 60 * 1000; // 24小時

        const btn = document.getElementById('btn-spin');
        const timer = document.getElementById('spin-timer');

        if(diff < coolDown) {
            btn.disabled = true;
            const hours = Math.ceil((coolDown - diff) / (1000 * 60 * 60));
            timer.innerText = `下次抽獎還需等待約 ${hours} 小時`;
        } else {
            btn.disabled = false;
            timer.innerText = "今日免費次數已準備就緒！";
        }
    }

    window.spinWheel = async () => {
        const btn = document.getElementById('btn-spin');
        btn.disabled = true;

        const wheel = document.getElementById('lucky-wheel');
        const randomDegree = Math.floor(Math.random() * 360) + 1800; // 旋轉至少 5 圈
        wheel.style.transform = `rotate(${randomDegree}deg)`;

        // 旋轉動畫結束後結算 (4秒)
        setTimeout(async () => {
            const actualDegree = randomDegree % 360;
            let prize = 10;
            if(actualDegree < 60) prize = 50;
            else if(actualDegree < 120) prize = 20;
            else if(actualDegree < 180) prize = 100;
            else if(actualDegree < 240) prize = 30;
            else if(actualDegree < 300) prize = 10;
            else prize = 200;

            alert(`🎉 恭喜！你抽中了 💰 ${prize} 金幣！`);
            
            try {
                const ref = doc(db, "users", auth.currentUser.uid);
                await updateDoc(ref, {
                    coins: increment(prize),
                    lastSpin: Date.now()
                });
                location.reload();
            } catch(e) { console.error(e); }
        }, 4000);
    };

    function renderItems() {
        const styleList = document.getElementById('style-items');
        const utilList = document.getElementById('utility-items');
        styleList.innerHTML = ''; utilList.innerHTML = '';

        itemsBank.forEach(item => {
            const isOwned = (currentUserData.inventory || []).includes(item.id);
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <span class="item-icon">${item.icon}</span>
                <div class="item-name">${item.name}</div>
                <div class="item-desc">${item.desc}</div>
                <div class="item-price">💰 ${item.price}</div>
                <button class="btn-buy ${isOwned?'owned':'available'}" onclick="buyItem('${item.id}', ${item.price})">
                    ${isOwned ? '已擁有' : '立即購買'}
                </button>
            `;
            if(item.category === 'style') styleList.appendChild(div);
            else utilList.appendChild(div);
        });
    }

    window.buyItem = async (id, price) => {
        if((currentUserData.inventory || []).includes(id)) return;
        if(currentUserData.coins < price) return alert("金幣不足！快去完成任務賺錢吧！");

        if(!confirm(`確定要花費 💰 ${price} 購買此物品嗎？`)) return;

        try {
            const ref = doc(db, "users", auth.currentUser.uid);
            await updateDoc(ref, {
                coins: increment(-price),
                inventory: arrayUnion(id)
            });
            alert("購買成功！快去個人面板查看吧！");
            loadMallData(auth.currentUser);
        } catch(e) { alert("購買失敗：" + e.message); }
    };
</script>
</body>
</html>
    </main>
</div>
