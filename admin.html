<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>開發者中心 - Creative Blocks Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4C97FF; --secondary: #FFAB19; --accent: #855CD6;
            --bg: #0F172A; --card-bg: #1E293B; --text: #F8FAFC;
        }
        body { margin: 0; font-family: 'Outfit', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0B0E14; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 30px 0; }
        .nav-item { padding: 15px 30px; color: #94A3B8; cursor: pointer; transition: 0.3s; font-weight: bold; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(76, 151, 255, 0.1); color: var(--primary); border-left: 4px solid var(--primary); }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #64748B; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 900; text-transform: uppercase; }
        .badge-admin { background: rgba(133, 92, 214, 0.2); color: var(--accent); }
        .badge-teacher { background: rgba(255, 171, 25, 0.2); color: var(--secondary); }
        .badge-student { background: rgba(76, 151, 255, 0.2); color: var(--primary); }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 12px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #EF4444; color: white; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94A3B8; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; background: #0B0E14; border: 1px solid rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding: 0 30px 30px; font-weight: 900; color: var(--primary); font-size: 1.2rem;">管理面板</div>
    <div id="menu-dashboard" class="nav-item active" onclick="showTab('dashboard')">📊 系統概況</div>
    <div id="menu-users" class="nav-item" onclick="showTab('users')">👥 使用者管理</div>
    <div id="menu-questions" class="nav-item" onclick="showTab('questions')">❓ 題庫管理</div>
    <div style="margin: 20px 30px 10px; font-size: 11px; color: #475569; letter-spacing: 1px;">快速切換</div>
    <div class="nav-item" onclick="location.href='dashboard.html'">🏠 班級面板</div>
    <div class="nav-item" onclick="location.href='lab.html'">🧪 指令實驗室</div>
    <div class="nav-item" onclick="location.href='game.html'">🎮 邏輯遊戲</div>
    <div class="nav-item" onclick="location.href='shop.html'">🛒 創意商城</div>
    <div class="nav-item" onclick="location.href='chat.html'">💬 聊天室</div>
    <div id="init-box" style="display:none; margin-top:auto; padding:20px; background:rgba(239, 68, 68, 0.1); border-top:1px solid rgba(239, 68, 68, 0.2);">
        <p style="font-size:12px; color:#FCA5A5; margin-bottom:10px;">⚠️ 偵測到無管理員帳號</p>
        <button class="btn btn-danger" style="width:100%;" onclick="setupFirstAdmin()">設為首位開發者</button>
    </div>
</div>

<div class="main">
    <div id="tab-dashboard">
        <div class="header"><h1>系統概況</h1></div>
        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; margin-bottom:40px;">
            <div class="card" style="text-align:center;"><h3>使用者總數</h3><div id="stat-users" style="font-size:3rem; font-weight:900; color:var(--primary);">0</div></div>
            <div class="card" style="text-align:center;"><h3>題庫總數</h3><div id="stat-questions" style="font-size:3rem; font-weight:900; color:var(--secondary);">0</div></div>
            <div class="card" style="text-align:center;"><h3>運行狀態</h3><div style="font-size:3rem; font-weight:900; color:#10B981;">Online</div></div>
        </div>
    </div>

    <div id="tab-users" style="display:none;">
        <div class="header">
            <h1>使用者管理</h1>
            <div style="color: #64748B;">管理全站權限與角色</div>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>使用者 Email</th>
                        <th>目前角色</th>
                        <th>權限設定</th>
                        <th>獎勵操作</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- 動態載入 -->
                </tbody>
            </table>
        </div>
    </div>

    <div id="tab-questions" style="display:none;">
        <div class="header">
            <h1>題庫管理</h1>
            <button class="btn btn-primary" onclick="openQModal()">+ 新增題目</button>
        </div>
        <div class="card">
            <div id="q-list">
                <!-- 動態載入 -->
            </div>
        </div>
    </div>

    <div id="tab-announcements" style="display:none;">
        <div class="header">
            <h1>公告管理</h1>
            <button class="btn btn-primary" onclick="openAModal()">+ 發布新公告</button>
        </div>
        <div class="card" id="ann-list" style="padding:0;">
            <!-- 動態載入 -->
        </div>
    </div>
</div>

<!-- Announcement Modal -->
<div id="a-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:100; align-items:center; justify-content:center;">
    <div class="card" style="width:500px;">
        <h3>發布全站公告</h3>
        <div class="form-group">
            <label>標題</label>
            <input type="text" id="a-title" placeholder="公告標題">
        </div>
        <div class="form-group">
            <label>內容</label>
            <textarea id="a-content" style="width:100%; height:100px; background:#0B0E14; border:1px solid rgba(255,255,255,0.1); color:white; border-radius:12px; padding:10px;"></textarea>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn" style="background:#334155;" onclick="closeAModal()">取消</button>
            <button class="btn btn-primary" onclick="saveAnnouncement()">發布</button>
        </div>
    </div>
</div>

<!-- Question Modal -->
<div id="q-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:100; align-items:center; justify-content:center;">
    <div class="card" style="width:500px;">
        <h3>新增/編輯題目</h3>
        <div class="form-group">
            <label>題目內容</label>
            <input type="text" id="q-text" placeholder="例如：1+1=?">
        </div>
        <div class="form-group">
            <label>選項 (用逗號隔開)</label>
            <input type="text" id="q-options" placeholder="2, 3, 4, 5">
        </div>
        <div class="form-group">
            <label>正確答案是第幾個？</label>
            <input type="number" id="q-answer" value="1" min="1" placeholder="填寫序號，例如 1 代表第一個選項">
        </div>
        <div class="form-group">
            <label>難度</label>
            <select id="q-diff">
                <option value="1">1 - 簡單</option>
                <option value="2">2 - 中等</option>
                <option value="3">3 - 困難</option>
            </select>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn" style="background:#334155;" onclick="closeQModal()">取消</button>
            <button class="btn btn-primary" onclick="saveQuestion()">儲存題目</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU", authDomain: "chat-52c0d.firebaseapp.com", projectId: "chat-52c0d", appId: "1:449329325475:web:75f255c4055360dc9e6616" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let myRole = 'student';

    onAuthStateChanged(auth, async u => {
        if(!u) return location.href="login.html";
        
        // --- 寫死超級管理員絕對權限 ---
        if (u.email === 'chianghansen0302@gmail.com') {
            const ref = doc(db, "users", u.uid);
            const snap = await getDoc(ref);
            if(snap.exists() && snap.data().role !== 'admin') {
                await updateDoc(ref, { role: 'admin' });
            }
            myRole = 'admin';
            loadUsers();
            loadQuestions();
            loadAnnouncements();
            showTab('dashboard');
            return;
        }

        const snap = await getDoc(doc(db, "users", u.uid));
        const userData = snap.data();
        myRole = userData?.role || 'student';
        
        if(myRole !== 'admin' && myRole !== 'teacher') {
            // 檢查是否完全沒有 admin
            const adminQuery = await getDocs(collection(db, "users"));
            let adminExists = false;
            adminQuery.forEach(d => { if(d.data().role === 'admin') adminExists = true; });
            
            if(!adminExists) {
                document.getElementById('init-box').style.display = 'block';
                alert("系統初始化：偵測到目前無任何開發者。請點擊左下方「設為首位開發者」按鈕取得權限。");
            } else {
                alert("權限不足！只有老師或開發者能進入此面板。");
                location.href = "dashboard.html";
                return;
            }
        } else {
            if(myRole === 'teacher') {
                document.getElementById('menu-users').style.display = 'none';
                showTab('questions');
            } else {
                loadUsers();
            }
            loadQuestions();
            loadAnnouncements();
        }
    });

    window.setupFirstAdmin = async () => {
        if(confirm("確定要將此帳號設為首位開發者嗎？這將開啟最高管理權限。")) {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { role: 'admin' });
            alert("權限提升成功！即將重新整理。");
            location.reload();
        }
    };

    window.showTab = (tab) => {
        document.getElementById('tab-dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
        document.getElementById('tab-users').style.display = tab === 'users' ? 'block' : 'none';
        document.getElementById('tab-questions').style.display = tab === 'questions' ? 'block' : 'none';
        document.getElementById('tab-announcements').style.display = tab === 'announcements' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(event) event.target.classList.add('active');
        
        // 切換時自動重新整理數據
        if(tab === 'users') loadUsers();
        if(tab === 'questions') loadQuestions();
        if(tab === 'announcements') loadAnnouncements();
    };

    async function loadUsers() {
        const snap = await getDocs(collection(db, "users"));
        const tbody = document.getElementById('user-list');
        tbody.innerHTML = '';
        document.getElementById('stat-users').innerText = snap.size;
        snap.forEach(d => {
            const u = d.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${u.email}</td>
                <td><span class="badge badge-${u.role || 'student'}">${u.role || 'student'}</span></td>
                <td>
                    <select class="role-select" onchange="setRole('${d.id}', this.value)" style="width:auto; padding:5px; font-size:12px;">
                        <option value="student" ${u.role==='student'?'selected':''}>學生 (Student)</option>
                        <option value="teacher" ${u.role==='teacher'?'selected':''}>老師 (Teacher)</option>
                        <option value="admin" ${u.role==='admin'?'selected':''}>開發者 (Admin)</option>
                    </select>
                </td>
                <td>
                    <button class="btn btn-primary" onclick="giftCoins('${d.id}')" style="padding:5px 10px; font-size:11px;">🎁 送金幣</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.giftCoins = async (uid) => {
        const amt = prompt("輸入贈送金額：");
        if(amt && !isNaN(amt)) {
            await updateDoc(doc(db, "users", uid), { coins: increment(parseInt(amt)) });
            alert("贈送成功！");
        }
    };

    window.setRole = async (uid, role) => {
        await updateDoc(doc(db, "users", uid), { role });
        loadUsers();
    };

    window.openQModal = () => document.getElementById('q-modal').style.display = 'flex';
    window.closeQModal = () => document.getElementById('q-modal').style.display = 'none';

    window.saveQuestion = async () => {
        const text = document.getElementById('q-text').value;
        const optionsStr = document.getElementById('q-options').value;
        const ansIdx = parseInt(document.getElementById('q-answer').value) - 1; // 轉為 0-indexed
        const diff = parseInt(document.getElementById('q-diff').value);

        if(!text || !optionsStr || isNaN(ansIdx)) return alert("請填寫完整題目資訊！");

        const q = {
            text: text,
            options: optionsStr.split(',').map(s => s.trim()).filter(s => s !== ""),
            answer: ansIdx,
            diff: diff,
            author: auth.currentUser.uid
        };
        await addDoc(collection(db, "questions"), q);
        closeQModal();
        loadQuestions();
    };

    async function loadQuestions() {
        const snap = await getDocs(collection(db, "questions"));
        document.getElementById('stat-questions').innerText = snap.size;
        const list = document.getElementById('q-list');
        list.innerHTML = '';
        snap.forEach(d => {
            const q = d.data();
            const canDelete = q.author === auth.currentUser.uid || myRole === 'admin';
            const div = document.createElement('div');
            div.style = "padding:20px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;";
            div.innerHTML = `
                <div>
                    <div style="font-weight:bold;">${q.text}</div>
                    <div style="font-size:12px; color:#64748B;">選項：${q.options.join(' / ')} | 正確答案：第 ${q.answer + 1} 個 | 難度：${q.diff}</div>
                </div>
                ${canDelete ? `<button class="btn btn-danger" onclick="deleteQ('${d.id}')">刪除</button>` : `<span style="font-size:12px; color:#444;">無刪除權限</span>`}
            `;
            list.appendChild(div);
        });
    }

    window.deleteQ = async (id) => {
        if(confirm("確定刪除此題目？")) {
            await deleteDoc(doc(db, "questions", id));
            loadQuestions();
        }
    };
    window.openAModal = () => document.getElementById('a-modal').style.display = 'flex';
    window.closeAModal = () => document.getElementById('a-modal').style.display = 'none';

    window.saveAnnouncement = async () => {
        const title = document.getElementById('a-title').value;
        const content = document.getElementById('a-content').value;
        if(!title || !content) return alert("請填寫內容！");
        await addDoc(collection(db, "announcements"), { title, content, date: serverTimestamp() });
        closeAModal();
        loadAnnouncements();
    };

    async function loadAnnouncements() {
        const snap = await getDocs(collection(db, "announcements"));
        const list = document.getElementById('ann-list');
        list.innerHTML = '';
        snap.forEach(d => {
            const a = d.data();
            const div = document.createElement('div');
            div.style = "padding:20px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;";
            div.innerHTML = `
                <div>
                    <div style="font-weight:bold;">${a.title}</div>
                    <div style="font-size:12px; color:#64748B;">${a.content}</div>
                </div>
                <button class="btn btn-danger" onclick="deleteAnn('${d.id}')">刪除</button>
            `;
            list.appendChild(div);
        });
    }

    window.deleteAnn = async (id) => {
        if(confirm("確定刪除此公告？")) {
            await deleteDoc(doc(db, "announcements", id));
            loadAnnouncements();
        }
    };
</script>
</body>
</html>
