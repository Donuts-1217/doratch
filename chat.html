<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>聊天室 - Creative Blocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4C97FF; --secondary: #FFAB19; --accent: #855CD6;
            --bg: #0F172A; --card-bg: #1E293B; --sidebar-bg: #0B0E14;
            --text: #F8FAFC; --text-muted: #94A3B8;
        }
        body { font-family: "Outfit", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 導覽列 */
        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); color: white; padding: 0 5%; height: 70px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.4rem; cursor: pointer; color: var(--primary); letter-spacing: 1px; }
        .btn-nav { text-decoration:none; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-nav:hover { background: var(--primary); color: white; }
        .nav-actions { display: flex; gap: 10px; align-items: center; }

        /* --- 下拉選單 Wrapper --- */
        .user-profile-wrapper { position: relative; padding: 10px 0; margin-left: 20px; }
        .user-profile { display: flex; align-items: center; gap: 6px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 6px 15px; border-radius: 50px; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .dropdown-menu { position: absolute; top: 50px; right: 0; width: 140px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; flex-direction: column; padding: 8px 0; z-index: 1001; }
        .user-profile-wrapper:hover .dropdown-menu { display: flex; }
        .dropdown-item { padding: 10px 20px; color: var(--text-muted); text-decoration: none; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* 聊天主容器 - Discord Style */
        .chat-container { display: flex; flex: 1; overflow: hidden; background: var(--bg); color: var(--text); }
        
        /* 左側列表區 */
        .sidebar { width: 300px; background: var(--sidebar-bg); display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header { min-height: 70px; padding: 15px 20px; display: flex; flex-direction: column; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header h3 { margin: 0; font-size: 16px; color: white; width: 100%; }
        .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-icon { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; padding: 6px 10px; font-size: 11px; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .btn-icon:hover { background: var(--primary); color: white; border-color: var(--primary); }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 20px 0; }
        .category-title { font-size: 11px; font-weight: 900; color: #475569; padding: 10px 25px; text-transform: uppercase; letter-spacing: 1.5px; }
        .chat-item { padding: 12px 20px; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; margin: 4px 15px; border-radius: 12px; }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: rgba(76, 151, 255, 0.1); border: 1px solid rgba(76, 151, 255, 0.2); }
        .chat-name { font-weight: bold; color: var(--text-muted); font-size: 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .chat-item:hover .chat-name, .chat-item.active .chat-name { color: white; }
        .chat-preview { font-size: 12px; color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 25px; }
        
        /* 右側對話區 */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .chat-header { height: 70px; padding: 0 30px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 900; font-size: 1.2rem; color: white; flex-shrink: 0; }
        
        .messages-area { flex: 1; padding: 30px 0; overflow-y: auto; display: flex; flex-direction: column; }
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .message-row { display: flex; padding: 8px 30px; transition: 0.2s; margin-top: 20px; }
        .message-row:hover { background: rgba(255,255,255,0.02); }
        .message-row.consecutive { margin-top: 2px; }
        .msg-avatar-container { width: 50px; margin-right: 20px; flex-shrink: 0; display: flex; justify-content: center; }
        .msg-avatar { width: 50px; height: 50px; border-radius: 16px; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .msg-time-hover { font-size: 11px; color: #475569; opacity: 0; text-align: center; width: 50px; }
        .message-row.consecutive:hover .msg-time-hover { opacity: 1; }
        
        .msg-content { display: flex; flex-direction: column; flex: 1; }
        .msg-header { display: flex; align-items: baseline; margin-bottom: 6px; }
        .msg-author { font-weight: 900; font-size: 1.1rem; color: white; margin-right: 12px; }
        .msg-time { font-size: 12px; color: var(--text-muted); }
        .msg-text { font-size: 15px; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-break: break-word; }
        
        /* 檔案附件卡片 */
        .msg-file-card { background: var(--card-bg); border: 1px solid rgba(76, 151, 255, 0.2); border-radius: 16px; padding: 20px; margin-top: 10px; display: inline-flex; align-items: center; gap: 20px; max-width: 400px; cursor: pointer; transition: 0.3s; }
        .msg-file-card:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .file-icon { font-size: 35px; }
        .file-info { flex: 1; overflow: hidden; }
        .file-name { font-weight: 900; color: var(--primary); font-size: 15px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; margin-bottom: 4px; }
        .file-sub { font-size: 12px; color: var(--text-muted); }

        /* 輸入區 */
        .input-area { padding: 0 30px 30px 30px; flex-shrink: 0; }
        .input-wrapper { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; display: flex; align-items: center; padding: 15px 25px; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 20px rgba(76, 151, 255, 0.1); }
        .btn-attach { background: rgba(255,255,255,0.1); color: white; border: none; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 20px; margin-right: 20px; transition: 0.2s; }
        .btn-attach:hover { background: var(--primary); }
        .input-box { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 400px; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .modal-content input { width: 100%; padding: 15px; margin: 20px 0; background: var(--bg); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; outline: none; }
        .btn-modal { padding: 12px 25px; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; }
        
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); background: var(--bg); }
        .empty-state i { font-size: 60px; margin-bottom: 20px; opacity: 0.2; }

        /* 成員列表側邊欄 */
        .member-sidebar { width: 260px; background: var(--sidebar-bg); border-left: 1px solid rgba(255,255,255,0.05); display: none; flex-direction: column; flex-shrink: 0; }
        .member-sidebar.active { display: flex; }
        .member-sidebar-header { height: 70px; padding: 0 25px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; font-weight: 900; color: white; }
        .member-list { flex: 1; overflow-y: auto; padding: 20px; }
        .member-item { display: flex; align-items: center; padding: 10px 15px; border-radius: 12px; margin-bottom: 4px; transition: 0.2s; }
        .member-item:hover { background: rgba(255,255,255,0.03); }
        .member-avatar { width: 36px; height: 36px; border-radius: 12px; margin-right: 15px; }
        .member-name { font-size: 14px; color: var(--text-muted); font-weight: bold; }
        .member-item:hover .member-name { color: white; }
        .kick-btn { background: #FF4D4D; color: white; border: none; border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; opacity: 0; transition: 0.2s; white-space: nowrap; }
        .member-item:hover .kick-btn { opacity: 1; }

        /* 全域導覽列樣式 */
        .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .sidebar-main { width: 260px; background: #0B0E14; color: white; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar-logo { padding: 30px; font-weight: 900; font-size: 1.2rem; color: var(--primary); cursor: pointer; }
        .nav-item { padding: 15px 30px; display: flex; align-items: center; gap: 12px; color: #94A3B8; text-decoration: none; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { color: var(--primary); border-left: 4px solid var(--primary); }
        .sidebar-footer { margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .user-mini-card { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.03); }
        .main-chat-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar-main">
        <div class="sidebar-logo" onclick="location.href='dashboard.html'">🧩 Creative Blocks</div>
        <a href="dashboard.html" class="nav-item">🏠 我的班級</a>
        <a href="lab.html" class="nav-item">🧪 指令實驗室</a>
        <a href="game.html" class="nav-item">🎮 指令塔防</a>
        <a href="shop.html" class="nav-item">🛒 創意商城</a>
        <a href="chat.html" class="nav-item active">💬 交流大廳</a>
        <a href="admin.html" id="admin-link-main" class="nav-item" style="display:none; color:var(--accent);">🛠️ 管理面板</a>
        
        <div class="sidebar-footer">
            <div class="user-mini-card">
                <img id="side-avatar" src="" style="width:32px; height:32px; border-radius:50%;">
                <div style="flex:1; overflow:hidden;">
                    <div id="side-username" style="font-size:12px; font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">載入中...</div>
                    <div style="font-size:10px; color:#64748B;">💰 <span id="side-coins">0</span></div>
                </div>
                <button onclick="handleLogout()" style="background:none; border:none; color:#64748B; cursor:pointer;">🚪</button>
            </div>
        </div>
    </aside>

    <div class="main-chat-wrapper">

<div class="chat-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>💬 聊天室</h3>
            <div class="action-btns">
                <button class="btn-icon" onclick="openModal('private')">➕ 私訊</button>
                <button class="btn-icon" style="background:#5865F2;" onclick="openModal('group')">👥 群聊</button>
                <button class="btn-icon" style="background:#4CAF50;" onclick="openModal('server')">🖥️ 建立伺服器</button>
                <button class="btn-icon" style="background:#f47f24; margin-top:5px;" onclick="openModal('joinServer')">🔑 加入伺服器</button>
            </div>
        </div>
        <div class="chat-list" id="chat-list">
            <div id="category-invite" style="display:none;">
                <div class="category-title" style="color:#f47f24;">🔔 待確認邀請</div>
                <div id="list-invites"></div>
            </div>

            <div class="category-title">🏫 伺服器 (班級)</div>
            <div id="list-server"></div>
            
            <div class="category-title">👥 群聊</div>
            <div id="list-group"></div>
            
            <div class="category-title">👤 私訊</div>
            <div id="list-private"></div>
        </div>
    </div>
    
    <div class="chat-main" id="chat-main">
        <div class="empty-state">
            <i>💬</i>
            <p>選擇或發起一個對話開始聊天吧！</p>
        </div>
    </div>
    
    <div class="member-sidebar" id="member-sidebar">
        <div class="member-sidebar-header">成員名單</div>
        <div class="member-list" id="member-list"></div>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title">新增</h3>
        <input type="text" id="modal-input" placeholder="..." onkeypress="if(event.key==='Enter') submitModal()">
        <div class="modal-actions">
            <button class="btn-modal" style="background:#35373c; color:white;" onclick="closeModal()">取消</button>
            <button class="btn-modal" style="background:#5865F2; color:white;" onclick="submitModal()" id="modal-submit">確認</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, addDoc, collection, query, where, orderBy, onSnapshot, serverTimestamp, getDocs, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU",
        authDomain: "chat-52c0d.firebaseapp.com",
        projectId: "chat-52c0d",
        appId: "1:449329325475:web:75f255c4055360dc9e6616"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentChatId = null;
    let currentChatParticipants = [];
    let unsubscribeMessages = null;
    let unsubscribeChatDoc = null;
    let modalMode = ''; // 'private' or 'group'

    window.handleLogout = () => signOut(auth).then(() => location.href='index.html');

    onAuthStateChanged(auth, async user => {
        if (!user) return location.href = "login.html";
        currentUser = user;

        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('side-coins').innerText = data.coins || 0;
            document.getElementById('side-username').innerText = user.email.split('@')[0];
            document.getElementById('side-avatar').src = `https://ui-avatars.com/api/?name=${user.email}&background=random`;
            
            let role = data.role || 'student';
            if (user.email === 'chianghansen0302@gmail.com') role = 'admin';
            if(role === 'admin' || role === 'teacher') {
                const adminLink = document.getElementById('admin-link-main');
                if(adminLink) {
                    adminLink.style.display = 'flex';
                    adminLink.innerText = role === 'admin' ? '🛠️ 管理面板' : '❓ 題庫管理';
                }
            }
        }

        try {
            await setDoc(userRef, {
                email: user.email || "",
                uid: user.uid,
                lastSeen: serverTimestamp()
            }, { merge: true });
        } catch (e) {}

        loadChats();

        const urlParams = new URLSearchParams(window.location.search);
        const openId = urlParams.get('open');
        if (openId) {
            const snap = await getDoc(doc(db, "chats", openId));
            if (snap.exists() && snap.data().participants.includes(user.uid)) {
                const d = snap.data();
                let name = d.name || "未命名";
                let icon = d.type === 'server' ? '🏫' : (d.type === 'private' ? '👤' : '👥');
                if (d.type === 'private') {
                    const otherEmail = (d.participantEmails || []).find(e => e !== user.email) || "未知";
                    name = otherEmail.split('@')[0];
                }
                openChat(openId, name, icon, d.type, d.teacherId);
            }
        }
    });

    // 2. 監聽並渲染聊天室列表
    function loadChats() {
        const q = query(
            collection(db, "chats"),
            where("participants", "array-contains", currentUser.uid)
        );

        onSnapshot(q, (snapshot) => {
            document.getElementById('list-server').innerHTML = '';
            document.getElementById('list-group').innerHTML = '';
            document.getElementById('list-private').innerHTML = '';
            
            if (snapshot.empty) {
                document.getElementById('list-private').innerHTML = '<div style="padding:20px; text-align:center; color:#949ba4; font-size:13px;">目前還沒有對話紀錄</div>';
                return;
            }

            // 在前端進行排序，避免需要 Firebase 建立複合索引 (Composite Index)
            const chats = [];
            snapshot.forEach(docSnap => chats.push({ id: docSnap.id, ...docSnap.data() }));
            chats.sort((a, b) => {
                const t1 = a.updatedAt ? a.updatedAt.toMillis() : 0;
                const t2 = b.updatedAt ? b.updatedAt.toMillis() : 0;
                return t2 - t1;
            });

            chats.forEach(chat => {
                let displayName = chat.name || "未命名";
                let rawName = displayName;
                let icon = '💬';
                if (chat.type === 'private') {
                    icon = '👤';
                    displayName = (chat.participantEmails || []).find(e => e !== currentUser.email) || "未知使用者";
                    displayName = displayName.split('@')[0];
                    rawName = displayName;
                } else if (chat.type === 'server') {
                    icon = '🏫';
                    displayName += ` <span style="font-size:10px; opacity:0.7; font-weight:normal;">(代碼: ${chat.id})</span>`;
                } else {
                    icon = '👥';
                }

                const item = document.createElement('div');
                item.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                item.onclick = () => openChat(chat.id, rawName, icon, chat.type, chat.teacherId);
                
                const timeStr = chat.updatedAt ? new Date(chat.updatedAt.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

                item.innerHTML = `
                    <div class="chat-name">${icon} ${displayName} <span style="margin-left:auto; font-size:10px; color:#949ba4; font-weight:normal;">${timeStr}</span></div>
                    <div class="chat-preview">${chat.lastMessage || '開始聊天吧！'}</div>
                `;
                
                if (chat.type === 'server') {
                    document.getElementById('list-server').appendChild(item);
                } else if (chat.type === 'private') {
                    document.getElementById('list-private').appendChild(item);
                } else {
                    document.getElementById('list-group').appendChild(item);
                }
            });
        });

        // 監聽待審批邀請
        const qInvites = query(
            collection(db, "chats"),
            where("pendingInvites", "array-contains", currentUser.uid)
        );

        onSnapshot(qInvites, (snapshot) => {
            const listDiv = document.getElementById('list-invites');
            const categoryDiv = document.getElementById('category-invite');
            listDiv.innerHTML = '';
            
            if (snapshot.empty) {
                categoryDiv.style.display = 'none';
                return;
            }
            categoryDiv.style.display = 'block';

            snapshot.forEach(docSnap => {
                const chat = { id: docSnap.id, ...docSnap.data() };
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.style.borderLeft = '3px solid #f47f24';
                item.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <div style="font-size:13px; font-weight:bold;">💌 邀請：${chat.name}</div>
                        <div style="display:flex; gap:10px;">
                            <button style="flex:1; background:#4CAF50; color:white; border:none; padding:4px; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="handleInvite('${chat.id}', true)">接受</button>
                            <button style="flex:1; background:#FF4D4D; color:white; border:none; padding:4px; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="handleInvite('${chat.id}', false)">拒絕</button>
                        </div>
                    </div>
                `;
                listDiv.appendChild(item);
            });
        });
    }

    // 處理邀請接受/拒絕
    window.handleInvite = async (chatId, isAccept) => {
        try {
            const ref = doc(db, "chats", chatId);
            if (isAccept) {
                const groupCount = await checkGroupLimit();
                if (groupCount >= 20) {
                    alert("接受失敗：您最多只能加入 20 個群組或伺服器！");
                    return;
                }
                await updateDoc(ref, {
                    pendingInvites: arrayRemove(currentUser.uid),
                    participants: arrayUnion(currentUser.uid)
                });
                alert("已成功加入！");
            } else {
                if(!confirm("確定要拒絕此邀請嗎？")) return;
                await updateDoc(ref, {
                    pendingInvites: arrayRemove(currentUser.uid)
                });
            }
        } catch (e) {
            alert("處理失敗：" + e.message);
        }
    };

    let currentChatTeacherId = null;
    let currentChatType = null;

    // 3. 開啟特定聊天室
    window.openChat = (chatId, chatName, icon, chatType, teacherId) => {
        currentChatId = chatId;
        currentChatTeacherId = teacherId;
        currentChatType = chatType;
        
        // 更新樣式
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
        const activeItem = Array.from(document.querySelectorAll('.chat-item')).find(el => el.onclick.toString().includes(chatId));
        if (activeItem) activeItem.classList.add('active');

        const displayTitle = chatType === 'server' ? `${chatName} <span style="font-size:12px; color:#949ba4;">(代碼: ${chatId})</span>` : chatName;
        const inviteBtnHtml = (chatType === 'group' || chatType === 'server') ? `<button class="btn-icon" style="margin-left:auto; background:#5865F2;" onclick="openModal('invite')">邀請</button>` : '';
        const memberToggleBtnHtml = (chatType === 'group' || chatType === 'server') ? `<button class="btn-icon" style="margin-left:8px; background:#4e5058;" onclick="toggleMemberSidebar()" title="顯示成員名單">👥</button>` : '';
        
        let manageBtnHtml = '';
        if (chatType === 'server' || chatType === 'group') {
            if (currentUser.uid === teacherId) {
                manageBtnHtml = `<button class="btn-icon" style="background:#FF4D4D; margin-left:10px;" onclick="deleteChat('${chatId}')">🗑️ 解散</button>`;
            } else {
                manageBtnHtml = `<button class="btn-icon" style="background:#f47f24; margin-left:10px;" onclick="leaveChat('${chatId}')">🚪 退出</button>`;
            }
        }

        const mainDiv = document.getElementById('chat-main');
        mainDiv.innerHTML = `
            <div class="chat-header">
                <h3 id="current-chat-name" style="margin: 0; font-size: 1.1rem;">${icon} ${displayTitle}</h3>
                <div style="margin-left:auto; display:flex; align-items:center;">
                    ${inviteBtnHtml}
                    ${memberToggleBtnHtml}
                    ${manageBtnHtml}
                </div>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="btn-attach" onclick="document.getElementById('file-input').click()" title="上傳 .xml 專案檔">➕</button>
                    <input type="file" id="file-input" accept=".xml" style="display:none" onchange="sendFile(this)">
                    <input type="text" id="msg-input" class="input-box" placeholder="傳送訊息到 #${chatName}" onkeypress="if(event.key==='Enter') sendMessage()">
                </div>
            </div>
        `;

        if (unsubscribeMessages) unsubscribeMessages();
        if (unsubscribeChatDoc) unsubscribeChatDoc();

        // 監聽聊天室文件（用於更新成員名單等）
        unsubscribeChatDoc = onSnapshot(doc(db, "chats", chatId), (docSnap) => {
            if (docSnap.exists()) {
                currentChatParticipants = docSnap.data().participants || [];
                if (document.getElementById('member-sidebar').classList.contains('active')) {
                    loadMembers();
                }
            }
        });

        const q = query(
            collection(db, "chats", chatId, "messages"),
            orderBy("createdAt", "asc")
        );

    window.currentMessages = {}; // 全域暫存，供下載檔案用

    unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const msgArea = document.getElementById('messages-area');
        let html = '';
        let lastSenderId = null;
        let lastTimeStr = null;
        
        window.currentMessages = {};

        snapshot.forEach(docSnap => {
            const msg = docSnap.data();
            window.currentMessages[docSnap.id] = msg;
            
            const senderName = (msg.senderEmail || "未知").split('@')[0];
            const timeObj = msg.createdAt ? msg.createdAt.toDate() : new Date();
            const timeStr = timeObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const fullTimeStr = timeObj.toLocaleDateString() + ' ' + timeStr;
            const avatarUrl = `https://ui-avatars.com/api/?name=${msg.senderEmail}&background=random`;
            
            const isConsecutive = (lastSenderId === msg.senderId) && (lastTimeStr === fullTimeStr);
            const isTeacher = currentChatTeacherId && msg.senderId === currentChatTeacherId;
            const badgeLabel = currentChatType === 'server' ? '房主' : '管理員';
            const teacherBadge = isTeacher ? `<span style="background: #5865F2; color: white; border-radius: 4px; padding: 2px 6px; font-size: 10px; margin-left: 6px; vertical-align: middle;">👑 ${badgeLabel}</span>` : '';
            
            let contentHtml = '';
            if (msg.type === 'file') {
                contentHtml = `
                    <div class="msg-file-card" onclick="downloadXml('${docSnap.id}')">
                        <div class="file-icon">📄</div>
                        <div class="file-info">
                            <div class="file-name">${msg.fileName}</div>
                            <div class="file-sub">Blockly XML 專案檔 (點擊下載)</div>
                        </div>
                        <div class="file-download-icon">⬇️</div>
                    </div>
                `;
            } else {
                const safeText = msg.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                contentHtml = `<div class="msg-text">${safeText}</div>`;
            }

            if (isConsecutive) {
                html += `
                    <div class="message-row consecutive">
                        <div class="msg-avatar-container"><span class="msg-time-hover">${timeStr}</span></div>
                        <div class="msg-content">${contentHtml}</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="message-row">
                        <div class="msg-avatar-container"><img src="${avatarUrl}" class="msg-avatar"></div>
                        <div class="msg-content">
                            <div class="msg-header">
                                <span class="msg-author">${senderName}${teacherBadge}</span>
                                <span class="msg-time">${fullTimeStr}</span>
                            </div>
                            ${contentHtml}
                        </div>
                    </div>
                `;
            }
            
            lastSenderId = msg.senderId;
            lastTimeStr = fullTimeStr;
        });
        msgArea.innerHTML = html;
        msgArea.scrollTop = msgArea.scrollHeight;
    });
        
        setTimeout(() => document.getElementById('msg-input').focus(), 100);
    };

    // 退出群組邏輯
    window.leaveChat = async (chatId) => {
        if (!confirm("確定要退出這個聊天室嗎？退出後需要重新受邀才能進入。")) return;
        try {
            await updateDoc(doc(db, "chats", chatId), {
                participants: arrayRemove(currentUser.uid)
            });
            document.getElementById('chat-main').innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#949ba4;">選擇一個聊天室開始對話</div>';
            currentChatId = null;
            currentChatTeacherId = null;
            currentChatType = null;
            alert("已成功退出聊天室");
        } catch (e) { alert("退出失敗：" + e.message); }
    };

    // 解散群組邏輯
    window.deleteChat = async (chatId) => {
        if (!confirm("⚠️ 警告：確定要解散這個聊天室嗎？\n此動作將永久刪除所有對話紀錄與檔案，且無法還原！")) return;
        try {
            await deleteDoc(doc(db, "chats", chatId));
            document.getElementById('chat-main').innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#949ba4;">選擇一個聊天室開始對話</div>';
            currentChatId = null;
            currentChatTeacherId = null;
            currentChatType = null;
            alert("已成功解散聊天室");
        } catch (e) { alert("解散失敗：" + e.message); }
    };

    // --- 成員管理相關 ---
    window.toggleMemberSidebar = () => {
        const sidebar = document.getElementById('member-sidebar');
        sidebar.classList.toggle('active');
        if (sidebar.classList.contains('active')) {
            loadMembers();
        }
    };

    window.loadMembers = async () => {
        if (!currentChatId || currentChatParticipants.length === 0) return;
        const listDiv = document.getElementById('member-list');
        listDiv.innerHTML = '<div style="color:#949ba4; font-size:12px; padding:10px;">載入成員中...</div>';
        
        try {
            // Firestore 的 'in' 查詢最多支援 10-30 個（視版本而定），因為我們限制 20 人，這裡直接分批或用 loop
            // 這裡簡單處理：直接 query users 集合
            const members = [];
            for (const uid of currentChatParticipants) {
                const userSnap = await getDoc(doc(db, "users", uid));
                if (userSnap.exists()) {
                    members.push(userSnap.data());
                }
            }

            // 排序：房主最前面
            members.sort((a, b) => {
                if (a.uid === currentChatTeacherId) return -1;
                if (b.uid === currentChatTeacherId) return 1;
                return 0;
            });

            listDiv.innerHTML = '';
            members.forEach(member => {
                const isOwner = member.uid === currentChatTeacherId;
                const isMe = member.uid === currentUser.uid;
                const avatarUrl = `https://ui-avatars.com/api/?name=${member.email}&background=random`;
                const displayName = (member.email || "未知").split('@')[0];
                
                const kickBtnHtml = (currentChatTeacherId === currentUser.uid && !isOwner && !isMe) 
                    ? `<button class="kick-btn" onclick="kickMember('${member.uid}', '${displayName}')">踢出</button>` 
                    : '';
                const crown = isOwner ? '<span style="margin-left:4px;">👑</span>' : '';

                const item = document.createElement('div');
                item.className = 'member-item';
                item.innerHTML = `
                    <img src="${avatarUrl}" class="member-avatar">
                    <div class="member-info">
                        <div class="member-name">${displayName}${crown}</div>
                    </div>
                    ${kickBtnHtml}
                `;
                listDiv.appendChild(item);
            });
        } catch (e) {
            console.error("載入成員失敗:", e);
            listDiv.innerHTML = '<div style="color:#FF4D4D; font-size:12px; padding:10px;">載入失敗</div>';
        }
    };

    window.kickMember = async (uid, name) => {
        if (!confirm(`確定要將成員「${name}」踢出聊天室嗎？`)) return;
        try {
            await updateDoc(doc(db, "chats", currentChatId), {
                participants: arrayRemove(uid)
            });
            alert(`已將 ${name} 踢出`);
        } catch (e) {
            alert("踢出失敗：" + e.message);
        }
    };

    // 私訊滿 300 條清理機制
    async function trimPrivateMessages(chatId) {
        if (currentChatType !== 'private') return;
        try {
            const msgsQuery = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
            const msgsSnap = await getDocs(msgsQuery);
            if (msgsSnap.size > 300) {
                const deleteCount = msgsSnap.size - 300;
                for (let i = 0; i < deleteCount; i++) {
                    await deleteDoc(msgsSnap.docs[i].ref);
                }
            }
        } catch (e) {
            console.error("清理舊訊息失敗:", e);
        }
    }

    // 4. 傳送文字訊息
    window.sendMessage = async () => {
        if (!currentChatId) return;
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.disabled = true;

        try {
            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                senderId: currentUser.uid,
                senderEmail: currentUser.email,
                text: text,
                type: "text",
                createdAt: serverTimestamp()
            });

            await updateDoc(doc(db, "chats", currentChatId), {
                lastMessage: text,
                updatedAt: serverTimestamp()
            });
            
            trimPrivateMessages(currentChatId);
        } catch (e) {
            alert("傳送失敗: " + e.message);
        } finally {
            input.disabled = false;
            input.focus();
        }
    };

    // 傳送檔案
    window.sendFile = (inputElem) => {
        if (!currentChatId || !inputElem.files || inputElem.files.length === 0) return;
        const file = inputElem.files[0];
        if (!file.name.endsWith('.xml')) {
            alert("目前僅支援分享 .xml 積木專案檔喔！");
            inputElem.value = "";
            return;
        }
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result;
            try {
                await addDoc(collection(db, "chats", currentChatId, "messages"), {
                    senderId: currentUser.uid,
                    senderEmail: currentUser.email,
                    text: `傳送了檔案：${file.name}`,
                    type: "file",
                    fileName: file.name,
                    fileData: content,
                    createdAt: serverTimestamp()
                });
                await updateDoc(doc(db, "chats", currentChatId), {
                    lastMessage: "📁 傳送了檔案",
                    updatedAt: serverTimestamp()
                });
                
                trimPrivateMessages(currentChatId);
            } catch(err) {
                alert("檔案傳送失敗：" + err.message);
            }
            inputElem.value = ""; // 重置 input
        };
        reader.readAsText(file);
    };

    // 下載檔案
    window.downloadXml = (msgId) => {
        const msg = window.currentMessages[msgId];
        if(!msg || !msg.fileData) return;
        const blob = new Blob([msg.fileData], {type: "text/xml"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = msg.fileName;
        a.click();
        URL.revokeObjectURL(url);
    };

    // 檢查群組數量限制 (最多 20 個)
    async function checkGroupLimit() {
        const q = query(collection(db, "chats"), where("participants", "array-contains", currentUser.uid));
        const snap = await getDocs(q);
        let count = 0;
        snap.forEach(doc => {
            const data = doc.data();
            if (data.type === 'group' || data.type === 'server') count++;
        });
        return count;
    }

    // 5. Modal 控制邏輯
    window.openModal = (mode) => {
        modalMode = mode;
        const modal = document.getElementById('modal');
        const title = document.getElementById('modal-title');
        const input = document.getElementById('modal-input');
        
        if (mode === 'private') {
            title.innerText = '發起私訊';
            input.placeholder = '請輸入對方的註冊 Email';
        } else if (mode === 'group') {
            title.innerText = '建立群聊';
            input.placeholder = '請為群組取個名稱';
        } else if (mode === 'server') {
            title.innerText = '建立伺服器';
            input.placeholder = '請為伺服器取個名稱';
        } else if (mode === 'joinServer') {
            title.innerText = '加入伺服器';
            input.placeholder = '請輸入 6 碼伺服器代碼';
        } else if (mode === 'invite') {
            title.innerText = '邀請成員加入';
            input.placeholder = '請輸入要邀請的 Email';
        }
        
        input.value = '';
        modal.style.display = 'flex';
        input.focus();
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    window.submitModal = async () => {
        const inputVal = document.getElementById('modal-input').value.trim();
        if (!inputVal) return;
        
        const btn = document.getElementById('modal-submit');
        btn.disabled = true;
        btn.innerText = "請稍候...";

        try {
            if (modalMode === 'group' || modalMode === 'server') {
                const groupCount = await checkGroupLimit();
                if (groupCount >= 20) {
                    alert("您最多只能加入 20 個群組或伺服器！");
                    closeModal();
                    return;
                }
            }

            if (modalMode === 'private') {
                const targetEmail = inputVal.toLowerCase();
                const currentEmail = currentUser.email || "";
                if (targetEmail === currentEmail.toLowerCase() && currentEmail !== "") {
                    alert("不能跟自己發私訊喔！");
                    throw new Error("Self chat");
                }

                // 透過 Email 尋找使用者 UID
                const userQuery = query(collection(db, "users"), where("email", "==", targetEmail));
                const userSnap = await getDocs(userQuery);
                
                if (userSnap.empty) {
                    alert("找不到此 Email 的聯絡人！對方可能尚未登入過聊天室。");
                    throw new Error("User not found");
                }
                const targetUid = userSnap.docs[0].id;

                // 檢查是否已有現存對話
                const chatQuery = query(collection(db, "chats"), 
                    where("participants", "array-contains", currentUser.uid)
                );
                const chatSnap = await getDocs(chatQuery);
                let existingChatId = null;
                chatSnap.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.type === 'private' && data.participants.includes(targetUid)) {
                        existingChatId = docSnap.id;
                    }
                });

                if (existingChatId) {
                    openChat(existingChatId, targetEmail.split('@')[0], '👤', 'private', null);
                } else {
                    const newChat = await addDoc(collection(db, "chats"), {
                        type: 'private',
                        participants: [currentUser.uid, targetUid],
                        participantEmails: [currentUser.email, targetEmail],
                        name: '',
                        lastMessage: '新對話',
                        updatedAt: serverTimestamp()
                    });
                    openChat(newChat.id, targetEmail.split('@')[0], '👤', 'private', null);
                }
                
            } else if (modalMode === 'group' || modalMode === 'server') {
                let chatId;
                if (modalMode === 'server') {
                    chatId = "S" + Math.random().toString(36).substr(2, 5).toUpperCase();
                    await setDoc(doc(db, "chats", chatId), {
                        type: 'server',
                        participants: [currentUser.uid],
                        teacherId: currentUser.uid,
                        name: inputVal,
                        lastMessage: '伺服器已建立',
                        updatedAt: serverTimestamp()
                    });
                } else {
                    const newChat = await addDoc(collection(db, "chats"), {
                        type: 'group',
                        participants: [currentUser.uid],
                        teacherId: currentUser.uid,
                        name: inputVal,
                        lastMessage: '群組已建立',
                        updatedAt: serverTimestamp()
                    });
                    chatId = newChat.id;
                }
                openChat(chatId, inputVal, modalMode === 'server' ? '🏫' : '👥', modalMode, currentUser.uid);
            } else if (modalMode === 'joinServer') {
                const code = inputVal.toUpperCase();
                const chatRef = doc(db, "chats", code);
                const chatSnap = await getDoc(chatRef);
                
                if (chatSnap.exists() && chatSnap.data().type === 'server') {
                    const groupCount = await checkGroupLimit();
                    if (groupCount >= 20) {
                        alert("加入失敗：您最多只能加入 20 個群組或伺服器！");
                        closeModal();
                        return;
                    }
                    await updateDoc(chatRef, {
                        participants: arrayUnion(currentUser.uid)
                    });
                    alert("成功加入伺服器！");
                    openChat(code, chatSnap.data().name, '🏫', 'server', chatSnap.data().teacherId);
                } else {
                    alert("查無此伺服器代碼，或是該代碼非伺服器！");
                }
            } else if (modalMode === 'invite') {
                const targetEmail = inputVal.toLowerCase();
                const userQuery = query(collection(db, "users"), where("email", "==", targetEmail));
                const userSnap = await getDocs(userQuery);
                
                if (userSnap.empty) {
                    alert("找不到此 Email 的聯絡人！");
                    throw new Error("User not found");
                }
                const targetUid = userSnap.docs[0].id;
                
                await updateDoc(doc(db, "chats", currentChatId), {
                    pendingInvites: arrayUnion(targetUid)
                });
                alert("邀請已送出！需等待對方確認後才會加入。");
            }
            closeModal();
        } catch (e) {
            console.error(e);
            if (e && e.message !== "User not found" && e.message !== "Self chat") {
                alert("操作失敗，請檢查資料庫權限或網路連線！\n" + e.message);
            }
        } finally {
            btn.disabled = false;
            btn.innerText = "確認";
        }
    };
</script>

</body>
</html>
    </div>
</div>
