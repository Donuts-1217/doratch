<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>邏輯電競中心 - Creative Blocks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4C97FF; --secondary: #FFAB19; --accent: #855CD6; --bg: #0F172A; --card-bg: #1E293B;
            --text: #F8FAFC;
        }
        body { font-family: 'Outfit', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        nav { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 0 5%; height: 80px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 900; font-size: 1.6rem; color: #4C97FF; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .coin-display { background: rgba(255, 171, 25, 0.15); border: 1px solid var(--secondary); padding: 8px 20px; border-radius: 50px; font-weight: 900; color: var(--secondary); display: flex; align-items: center; gap: 10px; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .hero { text-align: center; margin-bottom: 60px; }
        .hero h1 { font-size: 3.5rem; margin: 0; background: linear-gradient(to right, #4C97FF, #855CD6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .mode-section { margin-bottom: 60px; }
        .section-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .conquest-map { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; }
        .tile { aspect-ratio: 1; background: #334155; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid transparent; }
        .tile:hover { transform: scale(1.05); background: #475569; }
        .tile.occupied { background: var(--primary); color: white; border-color: white; box-shadow: 0 0 15px var(--primary); }
        .tile.locked { opacity: 0.5; cursor: not-allowed; }
        .tile.difficulty-1 { border-color: #4CB050; }
        .tile.difficulty-2 { border-color: #FFAB19; }
        .tile.difficulty-3 { border-color: #855CD6; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .game-card { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 40px; box-sizing: border-box; }
        .game-frame { max-width: 800px; margin: 0 auto; background: var(--card-bg); border-radius: 32px; padding: 40px; min-height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        
        .grid-2048 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; background: #334155; padding: 15px; border-radius: 12px; }
        .cell-2048 { width: 80px; height: 80px; background: #1E293B; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }
        
        .option-btn { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; font-weight: bold; }
        .option-btn:hover { background: var(--primary); transform: scale(1.02); }

        .reward-info { margin-top: 30px; display: flex; gap: 40px; font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.href='dashboard.html'">Creative Arena</div>
    <div class="coin-display">💰 <span id="user-coins">0</span></div>
</nav>

<div class="container">
    <div class="hero">
        <h1>挑戰你的邏輯極限</h1>
        <p>在這裡，好玩是必須的。透過遊戲賺取金幣，打造你的專屬角色。</p>
    </div>

    <div class="mode-section">
        <div class="section-title">🏆 旗艦競技 (PaGamO 模式)</div>
        <div class="game-grid">
            <div class="game-card" style="grid-column: 1 / -1; border: 2px solid var(--primary);" onclick="startGame('conquest')">
                <div style="font-size: 40px; margin-bottom: 15px;">🏰</div>
                <h3>邏輯攻城戰: 領土擴張</h3>
                <p>回答動態邏輯題目來攻佔領地。不同的地形代表不同的難度，你能統一整個王國嗎？</p>
            </div>
        </div>
    </div>

    <div class="mode-section">
        <div class="game-grid">
            <div class="game-card" onclick="startGame('2048')"><h3>🧩 2048: 數據融合</h3></div>
            <div class="game-card" onclick="startGame('runner')"><h3>⚡ Cyber Runner: 跑酷</h3></div>
            <div class="game-card" onclick="openDuelLobby()"><h3>⚔️ 1v1 代碼決鬥</h3></div>
            <div class="game-card" onclick="startGame('color')"><h3>🌈 色彩直覺</h3></div>
        </div>
    </div>
</div>

<div id="game-overlay">
    <div style="max-width:800px; margin: 0 auto 20px; display:flex; justify-content:space-between;">
        <h2 id="game-title">遊戲中</h2>
        <button onclick="exitGame()" style="background:#EF4444; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">離開</button>
    </div>
    <div class="game-frame">
        <div id="game-content" style="width:100%; text-align:center;"></div>
        <div class="reward-info">
            <span>得分：<span id="score">0</span></span>
            <span style="color:var(--secondary);">金幣：+<span id="earned">0</span></span>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, collection, setDoc, updateDoc, increment, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDwRdQFgQVn5Un8Od2nP4u5EbMx-dMOYoU", authDomain: "chat-52c0d.firebaseapp.com", projectId: "chat-52c0d", appId: "1:449329325475:web:75f255c4055360dc9e6616" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let score = 0, earned = 0, gameInterval = null;
    let globalQuestions = [{ text: "1+1=?", options: ["2", "3", "4"], answer: 0, diff: 1 }];

    onAuthStateChanged(auth, async u => {
        if(!u) return location.href="login.html";
        fetchUserData(u.uid);
        fetchGlobalQuestions();
    });

    async function fetchUserData(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        document.getElementById('user-coins').innerText = snap.data()?.coins || 0;
    }

    async function fetchGlobalQuestions() {
        const snap = await getDocs(collection(db, "questions"));
        if(!snap.empty) {
            globalQuestions = [];
            snap.forEach(d => globalQuestions.push(d.data()));
        }
    }

    window.startGame = (mode) => {
        document.getElementById('game-overlay').style.display = 'block';
        document.getElementById('game-content').innerHTML = ''; score = 0; earned = 0;
        if(mode === 'conquest') initConquest();
        else if(mode === '2048') init2048();
        // ... 其他遊戲邏輯 ...
    };

    window.exitGame = async () => {
        if(gameInterval) clearInterval(gameInterval);
        if(earned > 0) await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(earned) });
        location.reload();
    };

    // --- Conquest ---
    function initConquest() {
        document.getElementById('game-title').innerText = "邏輯攻城戰";
        const content = document.getElementById('game-content');
        content.innerHTML = `<div id="conquest-quiz" style="display:none;"></div><div class="conquest-map" id="conquest-map"></div>`;
        
        let mapData = Array(25).fill(0).map((_,i) => ({ id:i, status: i===12?'occupied':'empty', diff: Math.floor(Math.random()*3)+1 }));

        const renderMap = () => {
            const el = document.getElementById('conquest-map'); el.innerHTML = '';
            mapData.forEach((tile, i) => {
                const adj = [i-5,i+5,i%5>0?i-1:-1,i%5<4?i+1:-1].some(n => n>=0 && n<25 && mapData[n].status==='occupied');
                const div = document.createElement('div');
                div.className = `tile difficulty-${tile.diff} ${tile.status==='occupied'?'occupied':''} ${(!adj && tile.status!=='occupied')?'locked':''}`;
                div.innerHTML = tile.status === 'occupied' ? '👑' : (tile.diff === 1 ? '🌲' : (tile.diff === 2 ? '🏜️' : '🌋'));
                div.onclick = () => { if(tile.status === 'empty' && adj) startQuiz(i); };
                el.appendChild(div);
            });
        };

        const startQuiz = (idx) => {
            const tile = mapData[idx];
            const filtered = globalQuestions.filter(q => q.diff === tile.diff);
            const q = filtered.length ? filtered[Math.floor(Math.random()*filtered.length)] : globalQuestions[0];
            
            document.getElementById('conquest-map').style.display = 'none';
            const quiz = document.getElementById('conquest-quiz');
            quiz.style.display = 'block';
            quiz.innerHTML = `<h3>${q.text}</h3><div style="display:grid; gap:10px;">${q.options.map((opt, i) => 
                `<button class="option-btn" onclick="checkAns(${idx}, ${i}, ${q.answer})">${opt}</button>`).join('')}</div>`;
        };

        window.checkAns = (idx, choice, correct) => {
            if(choice === correct) {
                mapData[idx].status = 'occupied';
                earned += mapData[idx].diff * 50;
                alert("攻佔成功！");
            } else alert("答錯了！");
            document.getElementById('conquest-quiz').style.display = 'none';
            document.getElementById('conquest-map').style.display = 'grid';
            renderMap();
        };
        renderMap();
    }

    // --- 1v1 Duel ---
    window.openDuelLobby = () => {
        const code = prompt("輸入房間代碼：");
        if(code) initDuel(code);
    };

    async function initDuel(roomId) {
        document.getElementById('game-overlay').style.display = 'block';
        const duelRef = doc(db, "duels", roomId);
        const snap = await getDoc(duelRef);
        let myRole = 'p1';
        if(!snap.exists()) await setDoc(duelRef, { p1: { uid: auth.currentUser.uid, name: auth.currentUser.email.split('@')[0], hp: 100 }, status: 'waiting', qIdx: 0 });
        else { await updateDoc(duelRef, { p2: { uid: auth.currentUser.uid, name: auth.currentUser.email.split('@')[0], hp: 100 }, status: 'battling' }); myRole = 'p2'; }

        onSnapshot(duelRef, (s) => {
            const data = s.data(); if(!data) return;
            const content = document.getElementById('game-content');
            if(data.status === 'battling') {
                const q = globalQuestions[data.qIdx % globalQuestions.length];
                content.innerHTML = `<div>${data.p1.name} HP:${data.p1.hp} VS ${data.p2 ? data.p2.name : '...'} HP:${data.p2 ? data.p2.hp : 100}</div>
                    <h2>${q.text}</h2><div style="display:grid; gap:10px;">${q.options.map((opt, i) => 
                    `<button class="option-btn" onclick="duelAns('${roomId}', ${i}, ${q.answer}, '${myRole}')">${opt}</button>`).join('')}</div>`;
            } else if(data.status === 'finished') {
                content.innerHTML = `<h1>戰鬥結束！</h1><button class="option-btn" onclick="location.reload()">離開</button>`;
            }
        });
    }

    window.duelAns = async (roomId, choice, correct, role) => {
        const ref = doc(db, "duels", roomId);
        const snap = await getDoc(ref);
        const data = snap.data();
        if(choice === correct) {
            const opp = role === 'p1' ? 'p2' : 'p1';
            const newHp = Math.max(0, data[opp].hp - 25);
            await updateDoc(ref, { [`${opp}.hp`]: newHp, qIdx: increment(1), status: newHp === 0 ? 'finished' : 'battling' });
        }
    };
</script>
</body>
</html>
